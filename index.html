<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monflix - Cineberry</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav>
        <div class="nav-left">
            <a href="#" class="logo">MONFLIX</a>
            <button onclick="choisirFilmAleatoire()" class="btn-random">🎲 Hasard</button>
        </div>
        <div class="search-container">
            <input type="text" id="filmInput" class="search-bar" placeholder="Rechercher un film..."
                oninput="rechercherEnDirect()">
            <div id="searchResults" class="search-results-dropdown"></div>
        </div>
    </nav>

    <main class="catalog-container">
        <h2 class="section-title">Mon Catalogue Perso</h2>
        <div id="catalogGrid" class="film-grid"></div>
    </main>

    <div id="modalOverlay" class="overlay" onclick="fermerModal()"></div>

    <div id="movieModal" class="modal-cramberry">
        <button class="close-btn" onclick="fermerModal()">✕</button>
        <div id="modalBanner" class="modal-banner"></div>

        <div class="modal-content-info">
            <h1 id="modalTitle"></h1>
            <p id="modalInfo" class="meta-info"></p>

            <div id="playSection" style="margin-bottom: 25px;"></div>

            <p id="modalDesc"></p>

            <div id="videoContainer" style="display:none; margin-top:20px;">
                <video id="mainPlayer" width="100%" controls
                    style="border-radius: 8px; border: 1px solid var(--cramberry);">
                    <source src="" type="video/mp4">
                </video>
            </div>

            <div id="adminPanel" class="admin-panel">
                <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
                <p style="font-size: 0.8rem; color: #888;">Configuration du flux (Lien direct Drive) :</p>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="urlInput" placeholder="Coller le lien direct ici..."
                        style="flex:1; padding: 10px; border-radius: 5px; border: 1px solid #444; background: #000; color: white;">
                    <button onclick="enregistrerLienVideo()"
                        style="background: #444; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer;">Lier</button>
                </div>
            </div>

            <div class="modal-footer">
                <button id="btnDelete" class="btn-delete">Supprimer du catalogue 🗑️</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>

</html>
