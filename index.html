<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Monflix Cramberry</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <a href="#" class="logo">MONFLIX</a>
        <div>
            <input type="text" id="filmInput" class="search-bar" placeholder="Ajouter un film au catalogue...">
        </div>
    </nav>

    <div class="catalog-container">
        <h2 class="mb-4">Tout le catalogue</h2>
        <div id="catalogGrid" class="film-grid"></div>
    </div>

    <div id="modalOverlay" class="overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1500;" onclick="fermerModal()"></div>
    
    <div id="movieModal" class="modal-cramberry">
        <button class="close-btn" onclick="fermerModal()">✕</button>
        <div id="modalBanner" class="modal-banner"></div>
        <div style="padding: 30px; position: relative; margin-top: -60px;">
            <h1 id="modalTitle" style="font-size: 3rem; margin-bottom: 10px;"></h1>
            <p id="modalInfo" style="color: var(--cramberry); font-weight: bold; font-size: 1.2rem;"></p>
            <p id="modalDesc" style="line-height: 1.6; color: #ccc; max-width: 80%;"></p>
            <div id="videoPlayer"></div>
            <div class="mt-5 d-flex justify-content-between align-items-center">
    <div id="videoPlayer"></div>
    <button id="btnDelete" class="btn-delete">Supprimer du catalogue 🗑️</button>
</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
