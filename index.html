<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Marathon Ciné 🍿</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body class="container py-4">
    <h1 class="text-center mb-4">🎬 Marathon Manager</h1>

    <div class="input-group mb-3">
        <input type="text" id="filmInput" class="form-control" placeholder="Nom du film...">
        <button class="btn btn-primary" onclick="ajouterFilm()">Ajouter</button>
    </div>

    <div class="d-flex gap-2 mb-4">
        <button class="btn btn-warning w-100" onclick="choisirAleatoire()">🎲 Aléatoire</button>
        <button class="btn btn-success w-100" onclick="calculerMarathon()">🕒 Marathon</button>
    </div>

    <div id="listeMedias"></div>

    <script src="script.js"></script>
</body>
</html>
