<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monflix Cramberry</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="nav-left">
            <a href="#" class="logo">MONFLIX</a>
        </div>
        <div class="search-container">
            <input type="text" id="filmInput" class="search-bar" placeholder="Rechercher un film..." oninput="rechercherEnDirect()">
            <div id="searchResults" class="search-results-dropdown"></div>
        </div>
    </nav>

    <main class="catalog-container">
        <h2 class="section-title">Tout le catalogue</h2>
        <div id="catalogGrid" class="film-grid">
            </div>
    </main>

    <div id="modalOverlay" class="overlay" onclick="fermerModal()"></div>
    
    <div id="movieModal" class="modal-cramberry">
        <button class="close-btn" onclick="fermerModal()">✕</button>
        <div id="modalBanner" class="modal-banner"></div>
        <div class="modal-content-info">
            <h1 id="modalTitle"></h1>
            <p id="modalInfo" class="meta-info"></p>
            <p id="modalDesc"></p>
            
            <div id="videoPlayer"></div>

            <div class="modal-footer">
                <button id="btnDelete" class="btn-delete">Supprimer du catalogue 🗑️</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
